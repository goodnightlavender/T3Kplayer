<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- 180° top arc from left (6,12) over the top to right (18,12). -->
  <path d="M 6 12 A 6 6 0 0 1 18 12" stroke="#cfcfcf" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Short vertical tail from (18,12) down to (18,16). -->
  <line x1="18" y1="12" x2="18" y2="16" stroke="#cfcfcf" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Filled triangle arrowhead at the tail, pointing right. -->
  <polygon points="18,18 23,13 13,13" fill="#cfcfcf"/>
</svg>
